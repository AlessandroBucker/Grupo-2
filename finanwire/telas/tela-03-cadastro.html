<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro — FinanceIA</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/app-layout.css"/>
  <style>
    /* ── Step indicator ── */
    .step-indicator { display:flex; align-items:center; margin-bottom:32px; }
    .step-item { display:flex; flex-direction:column; align-items:center; }
    .step-circle {
      width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:600; transition:background .3s;
      background:#E5E7EB; color:var(--muted);
    }
    .step-circle.done    { background:var(--success); color:#fff; }
    .step-circle.active  { background:var(--cobalt);  color:#fff; }
    .step-label { font-size:11px; margin-top:4px; color:var(--muted); white-space:nowrap; }
    .step-label.active { color:var(--text); font-weight:500; }
    .step-connector { flex:1; height:2px; background:#E5E7EB; margin:0 8px; margin-bottom:18px; transition:background .3s; }
    .step-connector.done { background:var(--success); }

    /* ── Form grid ── */
    .form-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
    .form-grid .col-2 { grid-column:span 2; }
    @media(max-width:640px){ .form-grid { grid-template-columns:1fr; } .form-grid .col-2 { grid-column:span 1; } }

    /* ── Profile picker ── */
    .profile-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    @media(max-width:640px){ .profile-grid { grid-template-columns:1fr; } }
    .profile-pick {
      border:2px solid var(--border); border-radius:var(--radius);
      padding:14px; text-align:left; background:#fff; cursor:pointer;
      transition:border-color .15s;
    }
    .profile-pick:hover        { border-color:var(--muted); }
    .profile-pick.selected-adm { border-color:#1A56DB; background:#EFF6FF; }
    .profile-pick.selected-analyst { border-color:#1A56DB; background:#EFF6FF; }
    .profile-pick.selected-accountant { border-color:#1A56DB; background:#EFF6FF; }
    .profile-pick .badge { margin-bottom:8px; }
    .profile-pick p { font-size:11px; color:var(--muted); margin-top:4px; line-height:1.5; }

    /* ── Document checkboxes ── */
    .doc-check {
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; border-radius:var(--radius); border:1px solid var(--border);
      background:#fafafa; font-size:13px;
    }
    .doc-check input { accent-color:var(--cobalt); }
    .doc-check span  { margin-left:auto; }

    /* ── Type picker ── */
    .type-pick {
      padding:14px; border-radius:var(--radius); border:2px solid var(--border);
      text-align:left; background:#fff; cursor:pointer; transition:border-color .15s;
    }
    .type-pick:hover { border-color:var(--muted); }
    .type-pick.selected { border-color:#1A56DB; background:#EFF6FF; }
    .type-pick-title { font-size:13px; font-weight:500; margin-bottom:4px; }
    .type-pick-desc  { font-size:11px; color:var(--muted); line-height:1.5; }

    /* ── Summary grid ── */
    .summary-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .summary-item .summary-label { font-size:11px; color:var(--muted); }
    .summary-item .summary-val   { font-family:var(--font-mono); font-size:12px; font-weight:500; margin-top:2px; }

    /* ── Password match ── */
    .pwd-msg { font-size:12px; margin-top:4px; display:flex; align-items:center; gap:4px; }
    .pwd-msg svg { width:12px; height:12px; stroke:currentColor; fill:none; }
    .pwd-ok   { color:var(--success); }
    .pwd-err  { color:var(--danger); }

    /* ── Separator ── */
    .sep { height:1px; background:var(--border); margin:20px 0; }

    /* ── Success ── */
    .success-screen { padding:64px 20px; text-align:center; }
    .success-icon { width:64px; height:64px; border-radius:50%; background:var(--success); display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
    .success-icon svg { width:32px; height:32px; stroke:#fff; fill:none; }

    /* ── Nav buttons ── */
    .step-nav { display:flex; align-items:center; justify-content:space-between; margin-top:28px; padding-top:20px; border-top:1px solid var(--border); }
    .step-nav .step-counter { font-size:12px; color:var(--muted); }

    /* Tab local */
    .local-tabs-list { display:flex; gap:4px; background:#f3f4f6; padding:4px; border-radius:var(--radius); margin-bottom:24px; width:fit-content; }
    .local-tab { display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:6px; font-size:13px; font-weight:500; color:var(--muted); background:transparent; border:none; cursor:pointer; transition:background .15s, color .15s; }
    .local-tab:hover { color:var(--text); }
    .local-tab.active { background:#fff; color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .local-tab-content { display:none; }
    .local-tab-content.active { display:block; }
  </style>
</head>
<body>
<div class="app-shell" id="app"></div>
<script src="../js/sidebar.js"></script>
<script>
renderLayout({
  page:'tela-03-cadastro.html',
  title:'Cadastro',
  breadcrumbs:[{label:'Dashboard',href:'tela-02-dashboard.html'},{label:'Cadastro'}]
});

setTimeout(() => {
  document.getElementById('page-body').innerHTML = `
    <div class="wf-annotation" style="margin-bottom:16px;display:inline-block">
      Tela 3 — Cadastro · RF01 · RF02 · RF04 · RF06 · RF07 · RF11 · RF23
    </div>

    <div class="panel">
      <div class="panel-body">
        <!-- Local tabs -->
        <div class="local-tabs-list">
          <button class="local-tab active" data-ltab="empresa">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
            Cadastro de Empresa
          </button>
          <button class="local-tab" data-ltab="usuario">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            Cadastro de Usuário
          </button>
        </div>

        <!-- EMPRESA FORM -->
        <div class="local-tab-content active" id="ltab-empresa">
          <div class="step-indicator" id="step-ind-empresa"></div>
          <div id="empresa-step-body"></div>
          <div class="step-nav" id="empresa-step-nav"></div>
        </div>

        <!-- USUARIO FORM -->
        <div class="local-tab-content" id="ltab-usuario">
          <div class="step-indicator" id="step-ind-usuario"></div>
          <div id="usuario-step-body"></div>
          <div class="step-nav" id="usuario-step-nav"></div>
        </div>
      </div>
    </div>
  `;

  // ── Local tabs ──
  document.querySelectorAll('.local-tab').forEach(btn => {
    btn.addEventListener('click', function(){
      document.querySelectorAll('.local-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.local-tab-content').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('ltab-' + this.dataset.ltab).classList.add('active');
    });
  });

  // ── Empresa multi-step ──
  const EMPRESA_STEPS = ['Dados da Empresa','Responsável Técnico','Configurações','Confirmação'];
  let empresaStep = 1;
  let empresaData = { razaoSocial:'', cnpj:'', segmento:'', nomeResp:'', cpfResp:'', emailResp:'', analista:'', fechamento:'manual', lgpd:false };

  function renderStepIndicator(steps, current, prefix) {
    const el = document.getElementById(`step-ind-${prefix}`);
    el.innerHTML = steps.map((s,i) => {
      const n = i+1;
      const done = n < current, active = n === current;
      const connClass = n < current ? ' done' : '';
      return `
        <div class="step-item">
          <div class="step-circle ${done?'done':active?'active':''}">${done?
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
            :n}</div>
          <div class="step-label ${active?'active':''}">${s}</div>
        </div>
        ${i<steps.length-1?`<div class="step-connector${connClass}"></div>`:''}`
    }).join('');
  }

  const EMPRESA_BODIES = {
    1: () => `
      <div class="wf-annotation" style="margin-bottom:16px;display:inline-block">RF06 — Dados obrigatórios: Razão Social, CNPJ, Segmento</div>
      <div class="form-grid">
        <div class="col-2">
          <label class="form-label">Razão Social <span class="req">*</span></label>
          <input class="form-input" id="e-razao" placeholder="Ex.: Construtora Alpha Ltda" value="${empresaData.razaoSocial}"/>
        </div>
        <div>
          <label class="form-label">CNPJ <span class="req">*</span></label>
          <input class="form-input mono" id="e-cnpj" placeholder="00.000.000/0001-00" value="${empresaData.cnpj}"/>
          <div class="form-hint">RF02 — CNPJ deve ser único no sistema</div>
        </div>
        <div>
          <label class="form-label">Segmento de Atuação <span class="req">*</span></label>
          <select class="form-select" id="e-seg">
            <option value="">Selecione o segmento</option>
            ${['Comércio','Indústria','Serviços','Construção Civil','Tecnologia','Agronegócio','Saúde','Outro'].map(s=>`<option${empresaData.segmento===s?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="info-box info-box-blue" style="margin-top:16px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        RF09 — Ao inativar uma empresa, documentos e relatórios são preservados para consulta futura.
      </div>`,
    2: () => `
      <div class="wf-annotation" style="margin-bottom:16px;display:inline-block">RF11 — Responsável Técnico: pessoa física que responde pela empresa</div>
      <div class="form-grid">
        <div class="col-2">
          <label class="form-label">Nome Completo do Responsável <span class="req">*</span></label>
          <input class="form-input" id="e-nome-resp" placeholder="Ex.: João da Silva" value="${empresaData.nomeResp}"/>
        </div>
        <div>
          <label class="form-label">CPF do Responsável <span class="req">*</span></label>
          <input class="form-input mono" id="e-cpf-resp" placeholder="000.000.000-00" value="${empresaData.cpfResp}"/>
        </div>
        <div>
          <label class="form-label">E-mail do Responsável <span class="req">*</span></label>
          <input class="form-input" type="email" id="e-email-resp" placeholder="responsavel@empresa.com.br" value="${empresaData.emailResp}"/>
        </div>
        <div class="col-2">
          <label class="form-label">Analista Responsável <span class="req">*</span></label>
          <select class="form-select" id="e-analista">
            <option value="">Vincular analista interno (RF07)</option>
            ${['Tessália Santos (ANALISTA)','Alessandro Bucker (ANALISTA)','Samara Malta (ANALISTA)','Marlon Mendes (ANALISTA)','Gabriel Duglokinski (ANALISTA)'].map(a=>`<option>${a}</option>`).join('')}
          </select>
          <div class="form-hint">RF07 — O analista visualizará apenas as empresas sob sua responsabilidade</div>
        </div>
      </div>`,
    3: () => `
      <div class="wf-annotation" style="margin-bottom:16px;display:inline-block">RF28 · RF33 · RF35 — Configurações de fechamento e período contábil</div>
      <div style="margin-bottom:20px">
        <label class="form-label">Tipo de Fechamento de Período (RF28)</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">
          <button class="type-pick${empresaData.fechamento==='manual'?' selected':''}" id="pick-manual" onclick="empresaData.fechamento='manual';renderEmpresaStep()">
            <div class="type-pick-title">Manual</div>
            <div class="type-pick-desc">O analista define quando fechar cada período</div>
          </button>
          <button class="type-pick${empresaData.fechamento==='automatico'?' selected':''}" id="pick-auto" onclick="empresaData.fechamento='automatico';renderEmpresaStep()">
            <div class="type-pick-title">Automático</div>
            <div class="type-pick-desc">O sistema fecha automaticamente na data configurada</div>
          </button>
        </div>
      </div>
      <label class="form-label">Documentos Obrigatórios por Período</label>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
        ${['DRE (Demonstração de Resultado do Exercício)','Balanço Patrimonial','Balancete de Verificação'].map(d=>`
          <div class="doc-check"><input type="checkbox" checked/> ${d} <span class="wf-annotation">RF12</span></div>`).join('')}
      </div>`,
    4: () => `
      <div class="wf-annotation" style="margin-bottom:16px;display:inline-block">RF23 — Aceite LGPD obrigatório antes de salvar</div>
      <div class="panel" style="margin-bottom:16px;box-shadow:none">
        <div class="panel-body" style="background:#fafafa">
          <div style="font-size:13px;font-weight:600;margin-bottom:12px">Resumo do Cadastro</div>
          <div class="summary-grid">
            ${[['Razão Social',empresaData.razaoSocial||'—'],['CNPJ',empresaData.cnpj||'—'],['Segmento',empresaData.segmento||'—'],['Responsável',empresaData.nomeResp||'—'],['E-mail',empresaData.emailResp||'—'],['Analista',empresaData.analista||'—'],['Fechamento',empresaData.fechamento==='manual'?'Manual':'Automático']].map(([k,v])=>`
              <div class="summary-item"><div class="summary-label">${k}</div><div class="summary-val">${v}</div></div>`).join('')}
          </div>
        </div>
      </div>
      <div class="info-box info-box-blue" style="align-items:flex-start">
        <input type="checkbox" id="lgpd-empresa" style="margin-top:2px;accent-color:var(--cobalt);flex-shrink:0" onchange="empresaData.lgpd=this.checked"/>
        <label for="lgpd-empresa" style="cursor:pointer;font-size:13px">
          Confirmo que obtive o consentimento formal do responsável pela empresa para o tratamento
          dos dados cadastrais conforme a <strong>LGPD (Lei 13.709/2018)</strong>. (RF23)
        </label>
      </div>`,
  };

  window.renderEmpresaStep = function() {
    renderStepIndicator(EMPRESA_STEPS, empresaStep, 'empresa');
    document.getElementById('empresa-step-body').innerHTML = EMPRESA_BODIES[empresaStep]();
    const nav = document.getElementById('empresa-step-nav');
    if (document.getElementById('empresa-submitted')) return;
    nav.innerHTML = `
      <button class="btn btn-outline" onclick="empresaStep=Math.max(1,empresaStep-1);renderEmpresaStep()" ${empresaStep===1?'disabled':''}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Anterior
      </button>
      <span class="step-counter">Etapa ${empresaStep} de ${EMPRESA_STEPS.length}</span>
      ${empresaStep < EMPRESA_STEPS.length
        ? `<button class="btn btn-primary" onclick="empresaStep=Math.min(${EMPRESA_STEPS.length},empresaStep+1);renderEmpresaStep()">Próximo <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>`
        : `<button class="btn btn-success" onclick="submitEmpresa()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Salvar Empresa</button>`}
    `;
  };

  window.submitEmpresa = function() {
    const el = document.getElementById('empresa-step-body');
    el.innerHTML = `
      <div class="success-screen">
        <div class="success-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <h3 style="font-size:18px;font-weight:600;margin-bottom:6px">Empresa cadastrada com sucesso!</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:24px">A empresa foi registrada. O analista vinculado receberá uma notificação.</p>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="btn btn-outline" onclick="empresaStep=1;renderEmpresaStep()">Cadastrar outra empresa</button>
          <a href="tela-04-listagem.html" class="btn btn-primary">Ver lista de empresas</a>
        </div>
      </div>`;
    document.getElementById('empresa-step-nav').innerHTML = '';
    document.getElementById('step-ind-empresa').innerHTML = '';
  };

  renderEmpresaStep();

  // ── Usuário multi-step ──
  const USUARIO_STEPS = ['Dados Pessoais','Acesso e Perfil','Confirmação'];
  let usuarioStep = 1;
  let usuarioData = { nome:'', email:'', perfil:'', senha:'', confirmaSenha:'', lgpd:false };

  const USUARIO_BODIES = {
    1: () => `
      <div class="wf-annotation" style="margin-bottom:16px;display:inline-block">RF01 — Cadastro com e-mail e senha · RF02 — E-mail único</div>
      <div class="form-grid">
        <div class="col-2">
          <label class="form-label">Nome Completo <span class="req">*</span></label>
          <input class="form-input" id="u-nome" placeholder="Ex.: João da Silva" value="${usuarioData.nome}"/>
        </div>
        <div class="col-2">
          <label class="form-label">E-mail <span class="req">*</span></label>
          <input class="form-input" type="email" id="u-email" placeholder="usuario@empresa.com.br" value="${usuarioData.email}"/>
          <div class="form-hint">RF02 — Este e-mail não pode estar em uso por outro cadastro ativo</div>
        </div>
      </div>`,
    2: () => `
      <div class="wf-annotation" style="margin-bottom:16px;display:inline-block">RF04 — Hierarquia de Perfis: ADM / ANALISTA / CONTADOR</div>
      <div class="form-grid">
        <div class="col-2">
          <label class="form-label">Perfil de Acesso <span class="req">*</span></label>
          <div class="profile-grid" style="margin-top:8px">
            ${[
              {v:'ADM',     label:'Administrador',    cls:'badge-adm',        desc:'Acesso total ao sistema, incluindo configurações e gestão de usuários. (RF35)'},
              {v:'ANALISTA',label:'Analista Interno',  cls:'badge-analyst',    desc:'Acessa empresas vinculadas, valida documentos e gera relatórios. (RF07)'},
              {v:'CONTADOR',label:'Contador Externo',  cls:'badge-accountant', desc:'Faz upload de documentos e acompanha status de pendências. (RF12)'},
            ].map(p=>`
              <button class="profile-pick${usuarioData.perfil===p.v?' selected-'+p.v.toLowerCase():''}" onclick="usuarioData.perfil='${p.v}';renderUsuarioStep()">
                <span class="badge ${p.cls}">${p.label}</span>
                <p>${p.desc}</p>
              </button>`).join('')}
          </div>
        </div>
      </div>
      <div class="sep"></div>
      <div class="form-grid">
        <div>
          <label class="form-label">Senha <span class="req">*</span></label>
          <input class="form-input" type="password" id="u-senha" placeholder="Mínimo 8 caracteres" oninput="checkPwd()"/>
          <div class="form-hint">RNF04 — Armazenada com hash criptográfico seguro</div>
        </div>
        <div>
          <label class="form-label">Confirmar Senha <span class="req">*</span></label>
          <input class="form-input" type="password" id="u-senha2" placeholder="Repita a senha" oninput="checkPwd()"/>
          <div id="pwd-msg"></div>
        </div>
      </div>`,
    3: () => `
      <div class="wf-annotation" style="margin-bottom:16px;display:inline-block">RF23 — Aceite LGPD e confirmação de dados</div>
      <div class="panel" style="margin-bottom:16px;box-shadow:none">
        <div class="panel-body" style="background:#fafafa">
          <div style="font-size:13px;font-weight:600;margin-bottom:12px">Resumo do Cadastro</div>
          <div class="summary-grid">
            ${[['Nome',usuarioData.nome||'—'],['E-mail',usuarioData.email||'—'],['Perfil',usuarioData.perfil||'—']].map(([k,v])=>`
              <div class="summary-item"><div class="summary-label">${k}</div><div class="summary-val">${v}</div></div>`).join('')}
          </div>
        </div>
      </div>
      <div class="info-box info-box-blue" style="align-items:flex-start">
        <input type="checkbox" id="lgpd-user" style="margin-top:2px;accent-color:var(--cobalt);flex-shrink:0" onchange="usuarioData.lgpd=this.checked"/>
        <label for="lgpd-user" style="cursor:pointer;font-size:13px">
          Declaro que li e aceito os <strong>Termos de Uso e Política de Privacidade</strong>,
          autorizando o tratamento dos meus dados pessoais conforme a <strong>LGPD</strong>.
          Este consentimento será registrado com data e hora. (RF23)
        </label>
      </div>`,
  };

  window.renderUsuarioStep = function() {
    renderStepIndicator(USUARIO_STEPS, usuarioStep, 'usuario');
    document.getElementById('usuario-step-body').innerHTML = USUARIO_BODIES[usuarioStep]();
    const nav = document.getElementById('usuario-step-nav');
    nav.innerHTML = `
      <button class="btn btn-outline" onclick="usuarioStep=Math.max(1,usuarioStep-1);renderUsuarioStep()" ${usuarioStep===1?'disabled':''}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Anterior
      </button>
      <span class="step-counter">Etapa ${usuarioStep} de ${USUARIO_STEPS.length}</span>
      ${usuarioStep < USUARIO_STEPS.length
        ? `<button class="btn btn-primary" onclick="usuarioStep=Math.min(${USUARIO_STEPS.length},usuarioStep+1);renderUsuarioStep()">Próximo <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>`
        : `<button class="btn btn-success" onclick="submitUsuario()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Criar Usuário</button>`}
    `;
  };

  window.checkPwd = function() {
    const s1 = document.getElementById('u-senha')?.value||'';
    const s2 = document.getElementById('u-senha2')?.value||'';
    const msg = document.getElementById('pwd-msg');
    if(!msg) return;
    if(!s2) { msg.innerHTML=''; return; }
    if(s1===s2) msg.innerHTML=`<div class="pwd-msg pwd-ok"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Senhas coincidem</div>`;
    else msg.innerHTML=`<div class="pwd-msg pwd-err"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> As senhas não coincidem</div>`;
  };

  window.submitUsuario = function() {
    document.getElementById('usuario-step-body').innerHTML = `
      <div class="success-screen">
        <div class="success-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <h3 style="font-size:18px;font-weight:600;margin-bottom:6px">Usuário cadastrado com sucesso!</h3>
        <p style="font-size:13px;color:var(--muted);margin-bottom:24px">O usuário foi criado. Um e-mail de boas-vindas foi enviado.</p>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="btn btn-outline" onclick="usuarioStep=1;renderUsuarioStep()">Cadastrar outro usuário</button>
          <a href="tela-04-listagem.html" class="btn btn-primary">Ver lista de usuários</a>
        </div>
      </div>`;
    document.getElementById('usuario-step-nav').innerHTML='';
    document.getElementById('step-ind-usuario').innerHTML='';
  };

  renderUsuarioStep();
}, 0);
</script>
<script src="../js/app.js"></script>
</body>
</html>
