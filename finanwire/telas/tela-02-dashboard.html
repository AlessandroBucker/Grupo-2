<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — FinanceIA</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/app-layout.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ── KPI cards ── */
    .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }
    @media(max-width:900px){ .kpi-grid { grid-template-columns:repeat(2,1fr); } }
    .kpi-card {
      background:#fff; border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:0 1px 3px rgba(0,0,0,.05); padding:20px;
    }
    .kpi-card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
    .kpi-icon  { width:36px; height:36px; border-radius:6px; display:flex; align-items:center; justify-content:center; }
    .kpi-icon svg { width:16px; height:16px; }
    .kpi-trend svg { width:16px; height:16px; }
    .kpi-val   { font-family:var(--font-mono); font-size:24px; font-weight:600; color:var(--text); margin-bottom:2px; }
    .kpi-label { font-size:13px; font-weight:500; color:var(--text); margin-bottom:2px; }
    .kpi-sub   { font-size:12px; color:var(--muted); }

    /* ── User banner ── */
    .user-banner {
      background:#F0F9FF; border:1px solid #BFDBFE; border-radius:var(--radius);
      padding:14px 16px; display:flex; align-items:center; justify-content:space-between;
      margin-bottom:20px;
    }
    .user-banner-left { display:flex; align-items:center; gap:12px; }
    .user-banner-avatar {
      width:40px; height:40px; border-radius:50%; background:var(--cobalt);
      display:flex; align-items:center; justify-content:center;
      font-size:15px; font-weight:700; color:#fff; flex-shrink:0;
    }
    .user-banner-name { font-size:14px; font-weight:600; }
    .user-banner-info { font-size:12px; color:var(--muted); }

    /* ── Main grid ── */
    .main-grid { display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-bottom:20px; }
    @media(max-width:900px){ .main-grid { grid-template-columns:1fr; } }

    /* Processos table */
    .filter-tabs { display:flex; gap:4px; }
    .filter-tab {
      font-size:12px; font-weight:500; padding:4px 10px; border-radius:4px;
      border:none; background:transparent; color:var(--muted); cursor:pointer;
      transition:background .15s, color .15s;
    }
    .filter-tab:hover { background:#f3f4f6; color:var(--text); }
    .filter-tab.active { background:var(--cobalt); color:#fff; }

    /* Alerts */
    .alert-item {
      padding:10px 16px; border-bottom:1px solid var(--border); font-size:12px; line-height:1.5;
    }
    .alert-item:last-child { border-bottom:none; }
    .alert-item.warning { background:#FFFBEB; color:#92400E; }
    .alert-item.error   { background:#FEF2F2; color:#991B1B; }
    .alert-item.info    { background:#EFF6FF; color:#1E40AF; }
    .alert-item.success { background:#ECFDF5; color:#065F46; }
    .alert-icon-row { display:flex; align-items:flex-start; gap:6px; }
    .alert-icon-row svg { width:13px; height:13px; flex-shrink:0; margin-top:1px; stroke:currentColor; fill:none; }
    .alert-title { font-weight:600; }

    /* Charts */
    .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media(max-width:900px){ .charts-grid { grid-template-columns:1fr; } }
    .chart-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
    .chart-title { font-size:13px; font-weight:600; margin-bottom:16px; }

    /* Progress bar cell */
    .prog-cell { display:flex; align-items:center; gap:8px; min-width:90px; }

    .empty-queue { padding:48px 20px; text-align:center; }
    .empty-queue svg { width:36px; height:36px; stroke:var(--muted); fill:none; opacity:.4; margin:0 auto 10px; display:block; }
    .empty-queue p { font-size:13px; color:var(--muted); }
  </style>
</head>
<body>
<div class="app-shell" id="app"><!-- injected by sidebar.js --></div>

<script src="../js/sidebar.js"></script>
<script>
// ── State ──
const USER_PROFILES = {
  ADM: {
    nome: 'Samara Malta de Faria da Silva', perfil:'ADM', empresas:34,
    kpis: [
      { label:'Empresas Ativas',       val:'34',  sub:'+4 este mês',          color:'#1A56DB', trend:'up'   },
      { label:'Documentos Processados',val:'127', sub:'Últimos 30 dias',       color:'#059669', trend:'up'   },
      { label:'Pendentes de Envio',    val:'12',  sub:'3 com prazo vencido',   color:'#D97706', trend:'down' },
      { label:'Relatórios Gerados',    val:'89',  sub:'Mês atual: 18',         color:'#7C3AED', trend:'up'   },
    ],
    processos: [
      { empresa:'Construtora Alpha Ltda', cnpj:'12.345.678/0001-90', periodo:'Fev/2026', status:'Concluído',       prog:100 },
      { empresa:'Comércio Beta S.A.',     cnpj:'98.765.432/0001-10', periodo:'Fev/2026', status:'Em Processamento',prog:67  },
      { empresa:'Indústria Gamma ME',     cnpj:'11.222.333/0001-44', periodo:'Fev/2026', status:'Pendente',        prog:33  },
      { empresa:'Serviços Delta Eireli',  cnpj:'55.666.777/0001-88', periodo:'Jan/2026', status:'Pendente',        prog:0   },
      { empresa:'Tech Epsilon Ltda',      cnpj:'33.444.555/0001-22', periodo:'Fev/2026', status:'Concluído',       prog:100 },
    ],
    alertas: [
      { tipo:'warning', title:'Documento Pendente',  msg:'Comércio Beta S.A. — DRE Fev/2026 pendente há 5 dias (RF22)'    },
      { tipo:'error',   title:'Prazo Vencido',       msg:'Indústria Gamma ME — Prazo de entrega vencido em 01/03 (RF22)'  },
      { tipo:'info',    title:'Relatório Gerado',    msg:'Construtora Alpha — Relatório gerado com sucesso (RF25)'        },
      { tipo:'warning', title:'Nenhum Documento',    msg:'Serviços Delta — Nenhum documento enviado para Jan/2026 (RF20)' },
    ],
  },
};

// Default to ADM profile
const user = USER_PROFILES.ADM;

renderLayout({
  page:'tela-02-dashboard.html',
  title:`Dashboard — Visão Geral`,
  breadcrumbs:[{ label:'Dashboard' }],
  user:{ name: user.nome, role: user.perfil }
});

// Build page body
const STATUS_CLASS = {
  'Concluído':       'badge badge-done',
  'Em Processamento':'badge badge-processing',
  'Pendente':        'badge badge-pending',
};

let activeFilter = 'Todos';

function renderProcessos() {
  const list = activeFilter === 'Todos' ? user.processos
    : user.processos.filter(p => p.status === activeFilter);
  return list.map(p => `
    <tr onclick="location.href='tela-05-upload-ocr.html'" style="cursor:pointer">
      <td>
        <div style="font-size:12px;font-weight:500">${p.empresa}</div>
        <div style="font-size:11px;color:var(--muted);font-family:var(--font-mono)">${p.cnpj}</div>
      </td>
      <td class="hide-md"><span style="font-family:var(--font-mono);font-size:12px;color:var(--muted)">${p.periodo}</span></td>
      <td><span class="${STATUS_CLASS[p.status]}">${p.status}</span></td>
      <td class="hide-lg">
        <div class="prog-cell">
          <div class="progress-track"><div class="progress-fill" style="width:${p.prog}%"></div></div>
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted);width:28px">${p.prog}%</span>
        </div>
      </td>
      <td class="hide-lg"><span style="font-size:12px;color:var(--muted)">3/3</span></td>
      <td style="width:36px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </td>
    </tr>`).join('');
}

function renderAlerts() {
  const iconMap = {
    warning:`<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    error:  `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    info:   `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
    success:`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
  };
  return user.alertas.map(a => `
    <div class="alert-item ${a.tipo}">
      <div class="alert-icon-row">${iconMap[a.tipo]}<div><span class="alert-title">${a.title}</span><br/>${a.msg}</div></div>
    </div>`).join('');
}

function renderKPIs() {
  const upSVG   = `<svg viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`;
  const downSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>`;
  const icons = ['building','chart','bar','users'];
  const iconSVGs = {
    building:`<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>`,
    chart:   `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
    bar:     `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
    users:   `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>`,
  };
  return user.kpis.map((k,i) => `
    <div class="kpi-card">
      <div class="kpi-card-top">
        <div class="kpi-icon" style="background:${k.color}18;stroke:${k.color}">${iconSVGs[icons[i]]}</div>
        <span class="kpi-trend">${k.trend==='up'?upSVG:downSVG}</span>
      </div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');
}

setTimeout(() => {
  document.getElementById('page-body').innerHTML = `
    <div class="wf-annotation" style="margin-bottom:16px;display:inline-block">
      Tela 2 — Fluxo Principal · RF04 (Perfil: ADM) · RF10 · RF20 · RF21 · RF22 · RF25 · RF26 · RF27
    </div>

    <!-- User banner -->
    <div class="user-banner">
      <div class="user-banner-left">
        <div class="user-banner-avatar">S</div>
        <div>
          <div class="user-banner-name">${user.nome}</div>
          <div class="user-banner-info">Perfil: <span style="font-family:var(--font-mono);font-weight:500">${user.perfil}</span> · ${user.empresas} empresas atribuídas</div>
        </div>
      </div>
      <button class="btn btn-outline btn-sm logout-btn" style="font-size:12px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid" id="kpi-grid"></div>

    <!-- Main grid -->
    <div class="main-grid">
      <!-- Processos -->
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Processos em Andamento</div>
            <div class="panel-sub">RF20 — Status visual por empresa</div>
          </div>
          <div class="filter-tabs" id="filter-tabs">
            ${['Todos','Pendente','Em Processamento','Concluído'].map(f =>
              `<button class="filter-tab${f==='Todos'?' active':''}" data-filter="${f}">${f}</button>`
            ).join('')}
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table" id="processos-table">
            <thead>
              <tr>
                <th>Empresa</th>
                <th class="hide-md">Período</th>
                <th>Status</th>
                <th class="hide-lg">Progresso (RF21)</th>
                <th class="hide-lg">Docs</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="processos-body"></tbody>
          </table>
        </div>
      </div>

      <!-- Alertas -->
      <div class="panel" style="display:flex;flex-direction:column">
        <div class="panel-header">
          <div>
            <div class="panel-title">Alertas & Notificações</div>
            <div class="panel-sub">RF22 — Avisos automáticos por perfil</div>
          </div>
        </div>
        <div style="flex:1;overflow-y:auto" id="alerts-body"></div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Receita vs Despesa (RF26)</div>
        <canvas id="chart-revenue" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Indicadores Financeiros (RF25)</div>
        <canvas id="chart-indicators" height="200"></canvas>
      </div>
    </div>
  `;

  // Fill dynamic parts
  document.getElementById('kpi-grid').innerHTML     = renderKPIs();
  document.getElementById('processos-body').innerHTML = renderProcessos();
  document.getElementById('alerts-body').innerHTML  = renderAlerts();

  // Filter tabs
  document.getElementById('filter-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.filter-tab');
    if (!btn) return;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    document.getElementById('processos-body').innerHTML = renderProcessos();
  });

  // Logout buttons (added dynamically)
  document.querySelectorAll('.logout-btn').forEach(b => b.addEventListener('click', () => {
    window.location.href = 'tela-01-login.html';
  }));

  // Charts
  const months = ['Set','Out','Nov','Dez','Jan','Fev'];
  new Chart(document.getElementById('chart-revenue'), {
    type:'bar',
    data:{
      labels:months,
      datasets:[
        { label:'Receita', data:[420,380,510,490,560,610], backgroundColor:'#059669', borderRadius:4 },
        { label:'Despesa', data:[310,290,340,320,380,410], backgroundColor:'#D97706', borderRadius:4 },
      ]
    },
    options:{ responsive:true, plugins:{ legend:{ position:'bottom', labels:{ font:{ size:11 } } } },
      scales:{ x:{ grid:{ display:false } }, y:{ grid:{ color:'#E5E7EB' } } } }
  });
  new Chart(document.getElementById('chart-indicators'), {
    type:'line',
    data:{
      labels:months,
      datasets:[
        { label:'Liquidez', data:[1.8,1.6,2.1,1.9,2.3,2.5], borderColor:'#1A56DB', backgroundColor:'rgba(26,86,219,.1)', tension:.4, pointRadius:4, fill:true },
        { label:'EBITDA%', data:[22,19,25,23,28,31], borderColor:'#7C3AED', backgroundColor:'rgba(124,58,237,.08)', tension:.4, pointRadius:4, fill:true },
      ]
    },
    options:{ responsive:true, plugins:{ legend:{ position:'bottom', labels:{ font:{ size:11 } } } },
      scales:{ x:{ grid:{ display:false } }, y:{ grid:{ color:'#E5E7EB' } } } }
  });
}, 0);
</script>
<script src="../js/app.js"></script>
</body>
</html>
