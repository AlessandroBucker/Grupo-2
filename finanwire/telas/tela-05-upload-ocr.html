<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload OCR — FinanceIA</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/app-layout.css"/>
  <style>
    /* ── Layout ── */
    .upload-grid { display:grid; grid-template-columns:1fr 2fr; gap:20px; }
    @media(max-width:1024px){ .upload-grid { grid-template-columns:1fr; } }

    /* ── Drop zone ── */
    .drop-zone {
      border:2px dashed var(--border); border-radius:var(--radius);
      padding:40px 24px; text-align:center; cursor:pointer;
      transition:border-color .2s, background .2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color:var(--cobalt-light); background:#EFF6FF;
    }
    .drop-zone-icon {
      width:48px; height:48px; border-radius:50%; background:#F7F9FC;
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 12px;
    }
    .drop-zone-icon svg { width:20px; height:20px; stroke:var(--muted); fill:none; }
    .drag-over .drop-zone-icon { background:#DBEAFE; }
    .drag-over .drop-zone-icon svg { stroke:var(--cobalt); }
    .drop-zone p  { font-size:13px; font-weight:500; color:var(--text); margin-bottom:4px; }
    .drop-zone p.hint { font-size:12px; color:var(--muted); font-weight:400; }

    /* ── File queue ── */
    .file-item {
      padding:14px 20px; border-bottom:1px solid var(--border);
      display:flex; align-items:flex-start; gap:12px; cursor:pointer;
      transition:background .15s;
    }
    .file-item:last-child { border-bottom:none; }
    .file-item:hover { background:#F9FAFB; }
    .file-item.selected { background:#EFF6FF; }
    .file-icon svg { width:20px; height:20px; fill:none; stroke-width:2; flex-shrink:0; }
    .file-icon.pdf  svg { stroke:#DC2626; }
    .file-icon.xlsx svg { stroke:#059669; }
    .file-icon.image svg { stroke:#3B82F6; }
    .file-info { flex:1; min-width:0; }
    .file-name { font-size:13px; font-weight:500; color:var(--text); display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px; }
    .file-meta { display:flex; align-items:center; gap:12px; font-size:11px; color:var(--muted); }
    .conf-text { font-family:var(--font-mono); font-size:11px; font-weight:500; }
    .review-warning { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--warning); margin-top:4px; }
    .review-warning svg { width:11px; height:11px; stroke:currentColor; fill:none; }
    .remove-btn { background:none; border:none; cursor:pointer; padding:2px; border-radius:3px; color:var(--muted); flex-shrink:0; }
    .remove-btn:hover { background:#F3F4F6; }
    .remove-btn svg { width:13px; height:13px; stroke:currentColor; fill:none; display:block; }

    /* ── Spinner ── */
    .spinner { width:12px; height:12px; border:2px solid #BFDBFE; border-top-color:var(--cobalt); border-radius:50%; animation:spin .6s linear infinite; flex-shrink:0; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Review panel ── */
    .field-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:640px){ .field-grid { grid-template-columns:1fr; } }
    .field-card {
      padding:12px; border-radius:var(--radius); border:1px solid var(--border);
      background:#FAFAFA;
    }
    .field-card.needs-review { border-color:#FCD34D; background:#FFFBEB; }
    .field-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .field-label { font-size:12px; font-weight:500; color:var(--text); }
    .field-conf  { display:flex; align-items:center; gap:4px; }
    .field-conf svg { width:11px; height:11px; stroke:currentColor; fill:none; }
    .field-hint  { font-size:11px; color:var(--warning); margin-top:4px; }

    /* ── CTA banner ── */
    .cta-banner {
      background:#EFF6FF; border:1px solid #BFDBFE; border-radius:var(--radius);
      padding:16px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .cta-banner p { font-size:13px; font-weight:600; color:#1E3A8A; margin-bottom:2px; }
    .cta-banner span { font-size:12px; color:#1E40AF; }

    /* ── Empty ── */
    .empty { padding:48px 20px; text-align:center; }
    .empty svg { width:36px; height:36px; stroke:var(--muted); fill:none; opacity:.4; margin:0 auto 10px; display:block; }
    .empty p { font-size:13px; color:var(--muted); }
    .empty p.sub { font-size:12px; margin-top:4px; }
  </style>
</head>
<body>
<div class="app-shell" id="app"></div>
<script src="../js/sidebar.js"></script>
<script>
renderLayout({
  page:'tela-05-upload-ocr.html',
  title:'Upload de Documentos',
  breadcrumbs:[{label:'Dashboard',href:'tela-02-dashboard.html'},{label:'Upload de Documentos'}]
});

const MOCK_CAMPOS = [
  {nome:'Receita Bruta',            valor:'R$ 1.245.678,00', conf:97},
  {nome:'Custo dos Produtos Vendidos',valor:'R$ 834.521,00', conf:94},
  {nome:'Lucro Bruto',              valor:'R$ 411.157,00',   conf:99},
  {nome:'Despesas Operacionais',    valor:'R$ 189.430,00',   conf:88},
  {nome:'EBITDA',                   valor:'R$ 221.727,00',   conf:72},
  {nome:'Resultado Líquido',        valor:'R$ 156.890,00',   conf:95},
  {nome:'Total do Ativo',           valor:'R$ 3.456.789,00', conf:61},
  {nome:'Total do Passivo',         valor:'R$ 2.134.567,00', conf:58},
];

let files = [];
let selectedId = null;

const FILE_STATUS = {
  uploading:  {label:'Enviando...',        cls:'badge-processing'},
  processing: {label:'Processando OCR...', cls:'badge-processing'},
  done:       {label:'Processado',         cls:'badge-done'},
  review:     {label:'Revisão Necessária', cls:'badge-pending'},
  error:      {label:'Erro',               cls:'badge-error'},
};

function confColor(c){ return c>=80?'var(--success)':c>=60?'var(--warning)':'var(--danger)'; }

function fileIconHTML(type) {
  const paths = {
    pdf:   `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
    xlsx:  `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`,
    image: `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
  };
  return `<div class="file-icon ${type}">${paths[type]||paths.pdf}</div>`;
}

function addFile(name, size, type) {
  const id = Math.random().toString(36).slice(2);
  files.push({id,name,size,type,status:'uploading',progress:0,conf:undefined,campos:null});
  renderQueue();

  let p = 0;
  const up = setInterval(()=>{
    p += Math.random()*25+10;
    const f = files.find(x=>x.id===id);
    if (!f) { clearInterval(up); return; }
    if (p>=100) {
      clearInterval(up);
      f.progress=100; f.status='processing';
      renderQueue();
      setTimeout(()=>{
        const conf = Math.floor(Math.random()*40)+60;
        f.status = conf>=75?'done':'review';
        f.conf = conf;
        f.campos = MOCK_CAMPOS;
        renderQueue();
        renderCTA();
      }, 2000);
    } else {
      f.progress = Math.min(p,95);
      renderQueue();
    }
  }, 180);
}

function renderQueue() {
  const el = document.getElementById('file-queue');
  if (!files.length) {
    el.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>Nenhum arquivo na fila.</p><p class="sub">Selecione um arquivo para começar o processamento.</p></div>`;
    return;
  }
  el.innerHTML = files.map(f=>{
    const sc = FILE_STATUS[f.status];
    const isSelected = f.id===selectedId;
    const canSelect = f.status==='done'||f.status==='review';
    return `
      <div class="file-item${isSelected?' selected':''}" onclick="${canSelect?`selectFile('${f.id}')`:''}" id="fi-${f.id}">
        ${fileIconHTML(f.type)}
        <div class="file-info">
          <div class="file-name">
            <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</span>
            <span class="badge ${sc.cls}" style="flex-shrink:0">${sc.label}</span>
          </div>
          <div class="file-meta">
            <span>${f.size}</span>
            ${f.conf!==undefined?`<span class="conf-text" style="color:${confColor(f.conf)}">Confiança OCR: ${f.conf}%</span>`:''}
          </div>
          ${(f.status==='uploading'||f.status==='processing')?`
            <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
              <div class="progress-track"><div class="progress-fill" style="width:${f.status==='processing'?'100':f.progress}%;${f.status==='processing'?'animation:pulse 1.2s ease infinite':''}"></div></div>
              <div class="spinner"></div>
            </div>`:''}
          ${f.status==='review'?`<div class="review-warning"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>RF17 — Campos com baixa confiança detectados. Clique para revisar.</div>`:''}
        </div>
        <button class="remove-btn" onclick="event.stopPropagation();removeFile('${f.id}')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>`;
  }).join('');
}

window.selectFile = function(id) {
  selectedId = id;
  renderQueue();
  renderReview();
};

window.removeFile = function(id) {
  files = files.filter(f=>f.id!==id);
  if (selectedId===id) { selectedId=null; renderReview(); }
  renderQueue();
  renderCTA();
};

function renderReview() {
  const el = document.getElementById('review-panel');
  const f = files.find(x=>x.id===selectedId);
  if (!f||!f.campos) { el.innerHTML=''; return; }
  el.innerHTML = `
    <div class="panel" style="margin-top:20px">
      <div class="panel-header">
        <div>
          <div class="panel-title">Revisão de Dados Extraídos</div>
          <div class="panel-sub">RF17 — Campos com confiança abaixo de 75% exigem validação manual</div>
        </div>
        <div style="display:flex;gap:12px">
          <button class="btn btn-outline btn-sm" style="font-size:12px">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Ver original (RF18)
          </button>
          <button class="btn btn-outline btn-sm" style="font-size:12px">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
            Reprocessar
          </button>
        </div>
      </div>
      <div class="panel-body">
        <div class="field-grid">
          ${f.campos.map(c=>{
            const nr = c.conf<75;
            return `<div class="field-card${nr?' needs-review':''}">
              <div class="field-card-header">
                <label class="field-label">${c.nome}</label>
                <div class="field-conf" style="color:${confColor(c.conf)}">
                  ${nr?`<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`:''}
                  <span style="font-family:var(--font-mono);font-size:11px;font-weight:500">${c.conf}%</span>
                </div>
              </div>
              <input class="form-input mono" value="${c.valor}" style="${nr?'border-color:#FCD34D;background:#fff;':''}" />
              ${nr?`<div class="field-hint">Verifique e corrija se necessário</div>`:''}
            </div>`;
          }).join('')}
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
          <span style="font-size:12px;color:var(--muted)">${f.campos.filter(c=>c.conf>=75).length} de ${f.campos.length} campos validados automaticamente</span>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline btn-sm" onclick="selectedId=null;renderReview()">Cancelar</button>
            <button class="btn btn-success btn-sm" onclick="confirmFile('${f.id}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
              Confirmar e Salvar
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

window.confirmFile = function(id) {
  const f = files.find(x=>x.id===id);
  if (f) f.status='done';
  selectedId=null;
  renderQueue();
  renderReview();
  renderCTA();
};

function renderCTA() {
  const el = document.getElementById('cta-area');
  if (files.some(f=>f.status==='done')) {
    el.innerHTML=`<div class="cta-banner">
      <div><p>Documentos processados com sucesso!</p><span>RF25 — Gere o relatório consolidado em PDF agora.</span></div>
      <a href="tela-04-listagem.html" class="btn btn-primary btn-sm" style="flex-shrink:0">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Gerar Relatório
      </a>
    </div>`;
  } else {
    el.innerHTML='';
  }
}

const MOCK_FILES = [
  {name:'DRE_Fevereiro_2026.pdf',      size:'245 KB', type:'pdf'},
  {name:'Balanco_Patrimonial_Fev26.xlsx', size:'128 KB', type:'xlsx'},
  {name:'Balancete_Fev2026.pdf',       size:'312 KB', type:'pdf'},
];

setTimeout(()=>{
  document.getElementById('page-body').innerHTML = `
    <div class="wf-annotation" style="margin-bottom:16px;display:inline-block">
      Fluxo de Upload · RF12 · RF13 · RF14 · RF15 · RF16 · RF17 · RF18 · RF19
    </div>

    <div class="upload-grid">
      <!-- LEFT: selectors + drop zone -->
      <div style="display:flex;flex-direction:column;gap:16px">
        <!-- Context -->
        <div class="panel">
          <div class="panel-body">
            <div style="font-size:13px;font-weight:600;margin-bottom:12px">Contexto do Documento</div>
            <div class="wf-annotation" style="display:inline-block;margin-bottom:14px">RF14 — Vinculação automática empresa + período</div>
            <div style="display:flex;flex-direction:column;gap:12px">
              <div>
                <label class="form-label">Empresa <span class="req">*</span></label>
                <select class="form-select">
                  <option>Selecionar empresa</option>
                  <option>Construtora Alpha Ltda</option>
                  <option>Comércio Beta S.A.</option>
                  <option>Indústria Gamma ME</option>
                  <option>Serviços Delta Eireli</option>
                  <option>Tech Epsilon Ltda</option>
                </select>
              </div>
              <div>
                <label class="form-label">Tipo de Documento <span class="req">*</span></label>
                <select class="form-select">
                  <option>Selecionar tipo</option>
                  <option>DRE — Demonstração de Resultado</option>
                  <option>Balanço Patrimonial</option>
                  <option>Balancete de Verificação</option>
                </select>
              </div>
              <div>
                <label class="form-label">Período de Competência <span class="req">*</span></label>
                <select class="form-select">
                  <option>Mês/Ano</option>
                  <option>Fevereiro/2026</option>
                  <option>Janeiro/2026</option>
                  <option>Dezembro/2025</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Drop zone -->
        <div class="panel">
          <div class="panel-body">
            <div style="font-size:13px;font-weight:600;margin-bottom:8px">Enviar Arquivo</div>
            <div class="wf-annotation" style="display:inline-block;margin-bottom:12px">RF12 — PDF, XLSX, JPG/JPEG · RF13 — Filtro automático de tipo</div>
            <div class="drop-zone" id="drop-zone" onclick="simulateSelect()">
              <div class="drop-zone-icon">
                <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
              </div>
              <p id="drop-text">Arraste e solte ou clique para selecionar</p>
              <p class="hint">PDF, XLSX, XLS, JPG, JPEG — Máx. 25 MB</p>
            </div>
            <div class="info-box info-box-amber" style="margin-top:12px">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              RF13 — Arquivos fora dos tipos aceitos serão automaticamente bloqueados.
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT: queue + review -->
      <div>
        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">Fila de Processamento</div>
              <div class="panel-sub">RF15 — OCR assíncrono (RNF08)</div>
            </div>
            <span style="font-size:12px;color:var(--muted)" id="file-count"></span>
          </div>
          <div id="file-queue"></div>
        </div>

        <div id="review-panel"></div>
        <div id="cta-area" style="margin-top:16px"></div>
      </div>
    </div>
  `;

  renderQueue();

  // Drag & drop
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('drag-over');document.getElementById('drop-text').textContent='Solte o arquivo aqui';});
  dz.addEventListener('dragleave', ()=>{dz.classList.remove('drag-over');document.getElementById('drop-text').textContent='Arraste e solte ou clique para selecionar';});
  dz.addEventListener('drop', e=>{
    e.preventDefault(); dz.classList.remove('drag-over');
    document.getElementById('drop-text').textContent='Arraste e solte ou clique para selecionar';
    Array.from(e.dataTransfer.files).forEach(f=>{
      const ext=f.name.split('.').pop()?.toLowerCase();
      const type=ext==='pdf'?'pdf':ext==='xlsx'||ext==='xls'?'xlsx':'image';
      addFile(f.name, `${(f.size/1024).toFixed(0)} KB`, type);
    });
  });

  window.simulateSelect = function() {
    const m = MOCK_FILES[Math.floor(Math.random()*MOCK_FILES.length)];
    addFile(m.name, m.size, m.type);
  };
}, 0);
</script>
<script src="../js/app.js"></script>
</body>
</html>
